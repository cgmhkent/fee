<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自費項目管理 — 資料輸入</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0d7377;
            --teal-light: #14a085;
            --teal-pale: #e8f5f4;
            --amber: #e8a838;
            --amber-pale: #fef9ee;
            --red: #e05c5c;
            --gray-50: #f8fafb;
            --gray-100: #f0f3f5;
            --gray-200: #dde3e8;
            --gray-400: #8fa0af;
            --gray-600: #4a6070;
            --gray-800: #1e2f3a;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(13,115,119,0.08);
            --shadow-lg: 0 12px 40px rgba(13,115,119,0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: var(--teal);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 16px rgba(13,115,119,0.25);
        }
        header .brand {
            display: flex; align-items: center; gap: 12px;
        }
        header .logo {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        header h1 {
            font-family: 'DM Serif Display', serif;
            color: white;
            font-size: 22px;
            letter-spacing: 0.3px;
        }
        header .subtitle { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 2px; }
        header .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        header .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }

        /* ── Main Layout ── */
        main {
            max-width: 780px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        .page-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-400);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .page-heading {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 32px;
        }

        /* ── Category Tabs ── */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            background: var(--gray-200);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }
        .tab-btn {
            padding: 12px 16px;
            border: none;
            background: transparent;
            border-radius: 9px;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-400);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.25s;
        }
        .tab-btn.active {
            background: white;
            color: var(--teal);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tab-btn .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .tab-btn:first-child .dot { background: #5b9cf6; }
        .tab-btn:last-child .dot { background: #5ec98a; }

        /* ── Card ── */
        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            border: 1px solid var(--gray-200);
        }

        /* ── Form Elements ── */
        .form-section {
            border-bottom: 1px solid var(--gray-100);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }
        .form-section:last-of-type { border-bottom: none; }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--gray-400);
            margin-bottom: 16px;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .field-row.full { grid-template-columns: 1fr; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 6px;
        }
        label .req { color: var(--red); margin-left: 2px; }
        label .hint { font-weight: 400; color: var(--gray-400); margin-left: 4px; }

        input[type="text"],
        input[type="url"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 14px;
            color: var(--gray-800);
            background: var(--gray-50);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--teal-light);
            background: white;
            box-shadow: 0 0 0 3px rgba(13,115,119,0.08);
        }
        textarea { resize: vertical; min-height: 80px; }
        input::placeholder, textarea::placeholder { color: var(--gray-400); }

        /* ── Specs Table ── */
        .specs-wrapper {
            background: var(--gray-50);
            border: 1.5px dashed var(--gray-200);
            border-radius: 10px;
            padding: 16px;
        }
        .spec-row {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr auto;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spec-row input { margin-bottom: 0; font-size: 13px; padding: 8px 10px; }
        .spec-header {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
        }
        .spec-header span {
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: var(--gray-400);
            padding-left: 2px;
        }

        .remove-btn {
            width: 32px; height: 32px;
            border: none; background: #fee2e2; border-radius: 8px;
            color: var(--red); cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
            flex-shrink: 0; transition: background 0.2s;
        }
        .remove-btn:hover { background: #fecaca; }
        .remove-btn:disabled { opacity: 0.3; cursor: default; }

        .add-spec-btn {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 8px;
            color: var(--teal);
            background: none; border: none;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 13px; font-weight: 600;
            padding: 6px 2px;
            transition: color 0.2s;
        }
        .add-spec-btn:hover { color: var(--teal-light); }

        /* ── Image Upload ── */
        .upload-zone {
            border: 2px dashed var(--gray-200);
            border-radius: 10px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: var(--gray-50);
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--teal-light);
            background: var(--teal-pale);
        }
        .upload-zone input[type="file"] {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }
        .upload-icon { font-size: 32px; margin-bottom: 8px; }
        .upload-label { font-size: 14px; font-weight: 600; color: var(--teal); }
        .upload-hint { font-size: 12px; color: var(--gray-400); margin-top: 4px; }

        .upload-progress {
            display: none;
            margin-top: 10px;
            height: 4px; border-radius: 4px;
            background: var(--gray-200); overflow: hidden;
        }
        .upload-progress.visible { display: block; }
        .upload-progress-bar {
            height: 100%; width: 0%;
            background: var(--teal-light);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .upload-status {
            font-size: 12px; margin-top: 6px;
            color: var(--gray-400); text-align: center; min-height: 18px;
        }
        .upload-status.success { color: #2e7d52; font-weight: 600; }
        .upload-status.error { color: var(--red); font-weight: 600; }

        /* ── Image Preview ── */
        .image-preview-wrap {
            display: none; margin-top: 12px;
            position: relative; border-radius: 10px; overflow: hidden;
            border: 1px solid var(--gray-200);
        }
        .image-preview-wrap.visible { display: block; }
        .image-preview {
            width: 100%; max-height: 180px;
            object-fit: cover; display: block;
        }
        .remove-image-btn {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.55); color: white;
            border: none; border-radius: 6px;
            width: 28px; height: 28px; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .remove-image-btn:hover { background: rgba(0,0,0,0.8); }

        /* ── Submit Button ── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .submit-btn.material { background: var(--teal); color: white; }
        .submit-btn.material:hover { background: var(--teal-light); box-shadow: 0 4px 16px rgba(13,115,119,0.3); }
        .submit-btn.surgery { background: #2e7d52; color: white; }
        .submit-btn.surgery:hover { background: #3a9966; box-shadow: 0 4px 16px rgba(46,125,82,0.3); }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.6; cursor: wait; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 32px; right: 32px;
            background: var(--gray-800);
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 4px solid #5ec98a; }
        .toast.error { border-left: 4px solid var(--red); }

        /* ── Config Notice ── */
        .config-notice {
            background: var(--amber-pale);
            border: 1px solid #f5d883;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 28px;
            font-size: 13px;
            color: #7a5800;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .config-notice .icon { font-size: 18px; flex-shrink: 0; }
        .config-notice code {
            background: rgba(0,0,0,0.08);
            padding: 1px 5px; border-radius: 4px;
            font-family: monospace; font-size: 12px;
        }

        /* ── Hidden ── */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .field-row { grid-template-columns: 1fr; }
            .spec-row { grid-template-columns: 1fr 1fr; gap: 6px; }
            .spec-row input:nth-child(3) { grid-column: 1 / -1; }
            .spec-header { display: none; }
            main { padding: 0 16px 60px; }
            header { padding: 16px 20px; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="logo">🏥</div>
        <div>
            <h1>自費項目管理系統</h1>
            <div class="subtitle">Private Fee Item Management</div>
        </div>
    </div>
    <a href="catalog.html" class="nav-link">
        📋 前往型錄展示
    </a>
</header>

<main>
    <div class="page-title">資料輸入</div>
    <div class="page-heading">新增自費項目</div>

    <div class="config-notice">
        <span class="icon">⚙️</span>
        <div>
            <strong>設定 Google Sheets 串接：</strong>
            將下方 <code>SHEET_URL</code> 替換為你的 Google Apps Script 網址。
            設定方法請參考 <strong>README 設定說明</strong>（見下方檔案附件）。
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('material', this)">
            <span class="dot"></span> 材料和藥品
        </button>
        <button class="tab-btn" onclick="switchTab('surgery', this)">
            <span class="dot"></span> 手術和檢查
        </button>
    </div>

    <!-- 材料和藥品 -->
    <div class="form-panel active" id="panel-material">
        <div class="card">
            <form id="form-material" onsubmit="submitForm(event, 'material')">

                <div class="form-section">
                    <div class="section-label">基本資訊</div>
                    <div class="field-row">
                        <div>
                            <label>中文名 <span class="req">*</span></label>
                            <input type="text" name="twName" required placeholder="例：可吸收性止血棉">
                        </div>
                        <div>
                            <label>英文名 <span class="hint">（選填）</span></label>
                            <input type="text" name="enName" placeholder="例：Nasopore">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-label">規格 / 材料編號 / 價格</div>
                    <div class="specs-wrapper">
                        <div class="spec-header">
                            <span>規格</span>
                            <span>材料編號</span>
                            <span>價格 (NT$)</span>
                            <span></span>
                        </div>
                        <div id="specs-container">
                            <!-- 由 JS 動態產生 -->
                        </div>
                        <button type="button" class="add-spec-btn" onclick="addSpec()">
                            ＋ 增加規格 / 材料編號 / 價格
                        </button>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-label">圖片</div>
                    <div class="field-row full">
                        <div>
                            <label>上傳圖片 <span class="hint">（JPG / PNG / WEBP，上傳至 Google Drive）</span></label>
                            <div class="upload-zone" id="uploadZone"
                                ondragover="handleDragOver(event)"
                                ondragleave="handleDragLeave(event)"
                                ondrop="handleDrop(event)">
                                <input type="file" id="imageFile" accept="image/*" onchange="handleFileSelect(event)">
                                <div class="upload-icon">📁</div>
                                <div class="upload-label">點擊選擇圖片，或拖曳至此</div>
                                <div class="upload-hint">JPG、PNG、WEBP，建議 5MB 以內</div>
                            </div>
                            <div class="upload-progress" id="uploadProgress">
                                <div class="upload-progress-bar" id="uploadProgressBar"></div>
                            </div>
                            <div class="upload-status" id="uploadStatus"></div>
                            <div class="image-preview-wrap" id="imagePreviewWrap">
                                <img id="imagePreview" class="image-preview" alt="預覽圖片">
                                <button type="button" class="remove-image-btn" onclick="removeImage()" title="移除圖片">✕</button>
                            </div>
                            <!-- 隱藏欄位儲存 Drive 網址 -->
                            <input type="hidden" name="image" id="imageUrl">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-label">備註</div>
                    <div class="field-row full">
                        <div>
                            <label>備註說明 <span class="hint">（作用、注意事項等）</span></label>
                            <textarea name="note" placeholder="填寫此材料的用途或注意事項..."></textarea>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn material" id="submit-material">
                    💾 儲存至 Google Sheets
                </button>
            </form>
        </div>
    </div>

    <!-- 手術和檢查 -->
    <div class="form-panel" id="panel-surgery">
        <div class="card">
            <form id="form-surgery" onsubmit="submitForm(event, 'surgery')">

                <div class="form-section">
                    <div class="section-label">基本資訊</div>
                    <div class="field-row full">
                        <div>
                            <label>名稱 <span class="req">*</span></label>
                            <input type="text" name="name" required placeholder="例：微創達文西手術">
                        </div>
                    </div>
                    <div class="field-row">
                        <div>
                            <label>計價碼 <span class="hint">（選填）</span></label>
                            <input type="text" name="code" placeholder="例：65432C">
                        </div>
                        <div>
                            <label>費用 <span class="req">*</span> <span class="hint">（NT$）</span></label>
                            <input type="number" name="price" required placeholder="例：50000" min="0">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-label">備註</div>
                    <div class="field-row full">
                        <div>
                            <label>備註說明</label>
                            <textarea name="note" placeholder="填寫此手術或檢查的說明..."></textarea>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn surgery" id="submit-surgery">
                    💾 儲存至 Google Sheets
                </button>
            </form>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
    // ════════════════════════════════════════════════
    //  ⚙️  設定你的 Google Apps Script 網址
    // ════════════════════════════════════════════════
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyaDoDrfi7uQBhu5qpQTnkf_iNTQi09gHkQfH5zmS2Rf-8euCAV0dJq22q8Jz3nzw/exec';

    // ── Tab 切換 ──
    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + tab).classList.add('active');
    }

    // ── 規格動態管理 ──
    let specCount = 0;

    function addSpec(size = '', code = '', price = '') {
        specCount++;
        const container = document.getElementById('specs-container');
        const row = document.createElement('div');
        row.className = 'spec-row';
        row.id = `spec-${specCount}`;
        row.innerHTML = `
            <input type="text" name="spec_size[]" placeholder="規格 (例: 4cm)" value="${size}" required>
            <input type="text" name="spec_code[]" placeholder="材料編號" value="${code}">
            <input type="number" name="spec_price[]" placeholder="價格 (NT$)" value="${price}" min="0" required>
            <button type="button" class="remove-btn" onclick="removeSpec('spec-${specCount}')">✕</button>
        `;
        container.appendChild(row);
        updateRemoveButtons();
    }

    function removeSpec(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
        updateRemoveButtons();
    }

    function updateRemoveButtons() {
        const rows = document.querySelectorAll('.spec-row');
        rows.forEach(r => {
            const btn = r.querySelector('.remove-btn');
            btn.disabled = rows.length === 1;
        });
    }

    // ── 圖片上傳（本機 → Google Drive via Apps Script）──
    let uploadedImageUrl = '';

    function handleDragOver(e) {
        e.preventDefault();
        document.getElementById('uploadZone').classList.add('dragover');
    }
    function handleDragLeave(e) {
        document.getElementById('uploadZone').classList.remove('dragover');
    }
    function handleDrop(e) {
        e.preventDefault();
        document.getElementById('uploadZone').classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) uploadImage(file);
    }
    function handleFileSelect(e) {
        const file = e.target.files[0];
        if (file) uploadImage(file);
    }

    async function uploadImage(file) {
        const maxMB = 10;
        if (file.size > maxMB * 1024 * 1024) {
            setUploadStatus('error', `圖片過大（上限 ${maxMB}MB）`);
            return;
        }

        // 先顯示本地預覽
        const localUrl = URL.createObjectURL(file);
        showPreview(localUrl);
        setUploadStatus('', '⏳ 上傳中...');
        setProgress(true, 30);

        try {
            // 將圖片轉 base64
            const base64 = await fileToBase64(file);
            setProgress(true, 60);

            if (SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                // 示範模式：直接用本地 URL
                await new Promise(r => setTimeout(r, 600));
                uploadedImageUrl = localUrl;
                document.getElementById('imageUrl').value = localUrl;
                setProgress(true, 100);
                setTimeout(() => setProgress(false), 500);
                setUploadStatus('success', '✅ 示範模式：已預覽（尚未設定 Sheets 網址）');
                return;
            }

            // 送至 Apps Script 上傳 Drive
            const res = await fetch(SHEET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'uploadImage',
                    filename: file.name,
                    mimeType: file.type,
                    data: base64
                })
            });
            const result = await res.json();
            if (result.status === 'ok' && result.url) {
                uploadedImageUrl = result.url;
                document.getElementById('imageUrl').value = result.url;
                showPreview(result.url);
                setProgress(true, 100);
                setTimeout(() => setProgress(false), 500);
                setUploadStatus('success', '✅ 已上傳至 Google Drive');
            } else {
                throw new Error(result.message || '上傳失敗');
            }
        } catch (err) {
            setProgress(false);
            setUploadStatus('error', '❌ ' + err.message);
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function showPreview(url) {
        const preview = document.getElementById('imagePreview');
        const wrap = document.getElementById('imagePreviewWrap');
        preview.src = url;
        wrap.classList.add('visible');
    }

    function removeImage() {
        uploadedImageUrl = '';
        document.getElementById('imageUrl').value = '';
        document.getElementById('imagePreviewWrap').classList.remove('visible');
        document.getElementById('imagePreview').src = '';
        document.getElementById('imageFile').value = '';
        document.getElementById('uploadStatus').textContent = '';
        setProgress(false);
    }

    function setProgress(visible, pct = 0) {
        const bar = document.getElementById('uploadProgress');
        const fill = document.getElementById('uploadProgressBar');
        bar.classList.toggle('visible', visible);
        fill.style.width = pct + '%';
    }

    function setUploadStatus(type, msg) {
        const el = document.getElementById('uploadStatus');
        el.className = 'upload-status' + (type ? ' ' + type : '');
        el.textContent = msg;
    }

    // ── Toast 通知 ──
    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.className = `toast ${type}`;
        toast.innerHTML = (type === 'success' ? '✅' : '❌') + ' ' + msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ── 表單提交 ──
    async function submitForm(e, type) {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = '⏳ 儲存中...';

        try {
            let payload = { type, action: 'saveItem' };

            if (type === 'material') {
                const sizes = [...form.querySelectorAll('[name="spec_size[]"]')].map(i => i.value);
                const codes = [...form.querySelectorAll('[name="spec_code[]"]')].map(i => i.value);
                const prices = [...form.querySelectorAll('[name="spec_price[]"]')].map(i => i.value);

                payload = {
                    ...payload,
                    twName: form.twName.value.trim(),
                    enName: form.enName.value.trim(),
                    specs: sizes.map((s, i) => ({ size: s, code: codes[i], price: prices[i] })),
                    image: form.image.value.trim(),
                    note: form.note.value.trim(),
                    timestamp: new Date().toLocaleString('zh-TW')
                };
            } else {
                payload = {
                    ...payload,
                    name: form.name.value.trim(),
                    code: form.code.value.trim(),
                    price: form.price.value,
                    note: form.note.value.trim(),
                    timestamp: new Date().toLocaleString('zh-TW')
                };
            }

            if (SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                await new Promise(r => setTimeout(r, 800));
                console.log('📊 [示範模式] 資料：', payload);
                showToast('⚠️ 示範模式：請先設定 Google Sheets 網址', 'error');
            } else {
                const res = await fetch(SHEET_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.status === 'ok') {
                    showToast('資料已成功儲存至 Google Sheets！');
                    form.reset();
                    if (type === 'material') {
                        document.getElementById('specs-container').innerHTML = '';
                        addSpec();
                        removeImage();
                    }
                } else {
                    throw new Error(result.message || '未知錯誤');
                }
            }
        } catch (err) {
            console.error(err);
            showToast('儲存失敗：' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '💾 儲存至 Google Sheets';
        }
    }

    // ── 初始化 ──
    addSpec();
</script>
</body>
</html>
